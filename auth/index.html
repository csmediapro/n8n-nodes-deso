<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connect DeSo Wallet — n8n</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
    }
    .card {
      background: #1e293b;
      border-radius: 12px;
      padding: 2.5rem;
      max-width: 420px;
      width: 100%;
      text-align: center;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.3);
    }
    .card h1 { font-size: 1.5rem; margin-bottom: 0.75rem; }
    .card p { color: #94a3b8; margin-bottom: 1.5rem; line-height: 1.5; }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: #3b82f6;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 0.75rem 1.5rem;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn:hover { background: #2563eb; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-secondary { background: #475569; }
    .btn-secondary:hover { background: #334155; }
    .status {
      margin-top: 1.5rem;
      padding: 0.75rem;
      border-radius: 8px;
      font-size: 0.875rem;
      display: none;
    }
    .status.success { display: block; background: #065f46; color: #a7f3d0; }
    .status.error { display: block; background: #7f1d1d; color: #fecaca; }
    .debug-panel {
      display: none;
      margin-top: 1rem;
      text-align: left;
    }
    .debug-panel.visible { display: block; }
    .debug-panel h2 {
      font-size: 0.875rem;
      margin-bottom: 0.5rem;
      color: #cbd5e1;
    }
    .debug-panel pre {
      max-height: 240px;
      overflow: auto;
      white-space: pre-wrap;
      word-break: break-word;
      background: #020617;
      border: 1px solid #334155;
      border-radius: 8px;
      padding: 0.75rem;
      color: #cbd5e1;
      font-size: 0.75rem;
      line-height: 1.45;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Connect DeSo Wallet</h1>
    <p id="introText">Connect your DeSo wallet. In n8n mode, the returned auth material is stored as an encrypted credential. Local debug mode only shows masked field status.</p>

    <button id="connectBtn" class="btn" type="button">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M22 9h-6a2 2 0 0 0-2 2v2a2 2 0 0 0 2 2h6"/><circle cx="17" cy="13" r="2"/></svg>
      Connect DeSo Wallet
    </button>

    <div id="status" class="status"></div>
    <div id="debugPanel" class="debug-panel">
      <h2>Credential status</h2>
      <pre id="debugPayload"></pre>
    </div>
  </div>

  <script src="deso-protocol.bundle.js"></script>
  <script>
    // esbuild's IIFE bundle exposes DeSo Protocol on the global `deso` var.
    const desoClient = globalThis.deso;

    function showStatus(message, type) {
      const el = document.getElementById('status');
      el.className = 'status ' + type;
      el.textContent = message;
    }

    function setIntroText(message) {
      document.getElementById('introText').textContent = message;
    }

    function maskValue(value) {
      if (value === null || value === undefined || value === '') {
        return '';
      }

      const text = String(value);
      if (text.length <= 12) {
        return '[present]';
      }

      return text.slice(0, 6) + '...' + text.slice(-4) + ` (${text.length} chars)`;
    }

    function maskPayload(payload) {
      return Object.fromEntries(
        Object.entries(payload).map(([key, value]) => [key, maskValue(value)])
      );
    }

    function showDebugPayload(payload) {
      const panel = document.getElementById('debugPanel');
      const pre = document.getElementById('debugPayload');
      pre.textContent = JSON.stringify(maskPayload(payload), null, 2);
      panel.classList.add('visible');
    }

    async function connectWallet() {
      const btn = document.getElementById('connectBtn');
      btn.disabled = true;
      btn.textContent = 'Connecting...';
      setIntroText('Opening DeSo Identity. Complete the wallet prompt in the popup window.');

      try {
        if (!desoClient) {
          throw new Error('DeSo Protocol bundle did not load. Refresh and try again.');
        }

        // Configure deso-protocol
        desoClient.configure({
          nodeURI: 'https://node.deso.org',
          spendingLimitOptions: {
            GlobalDESOLimit: 10000000,
            TransactionCountLimitMap: {
              SUBMIT_POST: 'UNLIMITED',
            },
          },
        });

        // Open DeSo Identity popup
        const user = await desoClient.identity.login();

        if (!user || !user.publicKeyAdded) {
          throw new Error('Login did not return a public key. Please try again.');
        }

        // Get JWT if not on the login response
        let jwt = user.jwt;
        if (!jwt) {
          try {
            jwt = await desoClient.identity.jwt();
          } catch (e) {
            console.warn('Failed to retrieve JWT:', e);
          }
        }

        // Fetch profile for username
        let username = '';
        try {
          const res = await fetch('https://node.deso.org/api/v0/get-users-stateless', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ PublicKeysBase58Check: [user.publicKeyAdded] }),
          });
          if (res.ok) {
            const data = await res.json();
            if (data.UserList?.[0]) {
              username = data.UserList[0].ProfileEntryResponse?.Username || '';
            }
          }
        } catch (e) {
          console.warn('Failed to fetch profile:', e);
        }

        // Build credential data for the n8n callback.
        const activePublicKey = window.localStorage.getItem('desoActivePublicKey') || user.publicKeyAdded;
        const identityUsers = window.localStorage.getItem('desoIdentityUsers') || '';
        const loginKeyPair = window.localStorage.getItem('desoLoginKeyPair') || '';
        let primaryDerivedKey = null;

        try {
          const users = identityUsers ? JSON.parse(identityUsers) : {};
          primaryDerivedKey = users[user.publicKeyAdded]?.primaryDerivedKey || null;
        } catch (e) {
          console.warn('Failed to parse DeSo Identity users from localStorage:', e);
        }

        const payload = {
          publicKey: user.publicKeyAdded,
          jwt: jwt || '',
          derivedKey: primaryDerivedKey?.derivedPublicKeyBase58Check || user.derivedPublicKeyBase58Check || user.derivedKey || '',
          identityStorageJson: JSON.stringify({
            desoActivePublicKey: activePublicKey,
            desoIdentityUsers: identityUsers,
            desoLoginKeyPair: loginKeyPair,
          }),
          profileUsername: username,
        };

        showStatus('Wallet connected! Saving credentials...', 'success');

        // Post back to n8n callback
        // The callback URL is passed via query param from the credential setup
        const params = new URLSearchParams(window.location.search);
        const callbackUrl = params.get('callback');

        if (!callbackUrl) {
          showDebugPayload(payload);
          setIntroText('DeSo Identity authorization completed, but n8n did not provide a credential callback URL.');
          showStatus('Credential callback URL missing. Reopen this page from the n8n credential setup.', 'error');
          btn.disabled = false;
          btn.textContent = 'Connect DeSo Wallet';
          return;
        }

        const callbackRes = await fetch(callbackUrl, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload),
        });

        if (!callbackRes.ok) {
          const errText = await callbackRes.text();
          throw new Error('Failed to save credentials: ' + errText);
        }

        showStatus('Credentials saved successfully! You can close this window.', 'success');
        setIntroText('DeSo Identity authorization completed and the credential callback succeeded.');
        btn.style.display = 'none';

      } catch (error) {
        const msg = error instanceof Error ? error.message : 'Unknown error';
        showStatus(msg, 'error');
        setIntroText('Connection did not complete. You can try again.');
        btn.disabled = false;
        btn.textContent = 'Connect DeSo Wallet';
      }
    }

    document.getElementById('connectBtn').addEventListener('click', connectWallet);
  </script>
</body>
</html>
